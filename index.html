<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 날씨 정보</title>
    <style>
        /* --- CSS (스타일) --- */
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');

        :root {
            --bg-color: #a1c4fd;
            --card-bg: rgba(255, 255, 255, 0.2);
            --text-color: #333;
            --accent-color: #fff;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-color);
            transition: background 0.5s ease;
        }

        .weather-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px 40px;
            width: 320px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .loading-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            border-radius: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .loading-mask.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .location { font-size: 1.3rem; font-weight: 600; margin-bottom: 5px; }
        .base-time { font-size: 0.9rem; color: #666; margin-bottom: 25px; }
        
        .icon { 
            font-size: 6rem; 
            margin: 20px 0; 
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .temp { font-size: 4rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -2px; }
        .temp span { font-size: 2.5rem; font-weight: 400; vertical-align: super; }
        
        .description { font-size: 1.2rem; font-weight: 600; color: var(--accent-color); background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 20px; display: inline-block; margin-bottom: 35px; }

        .details {
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            padding-top: 25px;
            display: flex;
            justify-content: center;
        }

        .detail-item {
            text-align: center;
        }

        .detail-item .label { font-size: 0.9rem; color: #555; margin-bottom: 5px; display: block; }
        .detail-item .value { font-size: 1.2rem; font-weight: 600; }

        .error-msg { color: #ff4d4d; font-weight: 600; }

    </style>
</head>
<body>

    <div class="weather-card">
        <div id="loading-mask" class="loading-mask">날씨 정보 가져오는 중...</div>

        <div class="location">경기도 광명시</div>
        <div id="base-time" class="base-time">00:00 발표 데이터</div>
        
        <div id="weather-icon" class="icon">☀️</div>
        <div id="temperature" class="temp">--<span>°C</span></div>
        <div id="description" class="description">맑음</div>
        
        <div class="details">
            <div class="detail-item">
                <span class="label">현재 습도</span>
                <span id="humidity" class="value">--%</span>
            </div>
        </div>
    </div>

    <script>
        /* --- JavaScript (로직) --- */
        
        // 1. API 설정 (제공해주신 정보)
        const API_KEY = 'OaRLlfpKOXJH%2BFeghkAojoaSAQbb1bkFF9COvGfjixpiLkEYTHFLqIcBYqFb0HCrcX8H3A47X9QNiRpgcCXAOA%3D%3D'; // 인코딩된 키
        const NX = 58;
        const NY = 125;
        const BASE_URL = 'https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst';

        // 2. DOM 요소 가져오기
        const dom = {
            loading: document.getElementById('loading-mask'),
            time: document.getElementById('base-time'),
            icon: document.getElementById('weather-icon'),
            temp: document.getElementById('temperature'),
            desc: document.getElementById('description'),
            humi: document.getElementById('humidity'),
            card: document.querySelector('.weather-card')
        };

        // 3. 기상청 API용 시간 계산 함수 (중요!)
        // 초단기실황은 매시 45분에 생성됩니다. 안전하게 1시간 전 데이터를 요청하거나, 
        // 현재가 45분 이전이면 이전 시간 데이터를 가져와야 합니다.
        function getBaseTime() {
            const now = new Date();
            let year = now.getFullYear();
            let month = now.getMonth() + 1;
            let day = now.getDate();
            let hours = now.getHours();
            let minutes = now.getMinutes();

            // 45분 이전이면, 한 시간 전 데이터를 요청
            if (minutes < 45) {
                if (hours === 0) {
                    // 자정 이전인 경우 어제 날짜로 변경 필요 (이 예제에서는 단순화하여 이전 시간만 계산)
                    hours = 23;
                    // 날짜 변경 로직은 실제 서비스 시 추가 필요
                } else {
                    hours = hours - 1;
                }
            }

            // 포맷팅 (YYYYMMDD, HH00)
            const baseDate = `${year}${String(month).padStart(2, '0')}${String(day).padStart(2, '0')}`;
            const baseTime = `${String(hours).padStart(2, '0')}00`;

            return { baseDate, baseTime, displayTime: `${hours}:00` };
        }

        // 4. 강수 형태(PTY) 코드를 맑음/비/눈 상태와 아이콘으로 변환
        function getPTYStatus(ptyCode) {
            const code = parseInt(ptyCode);
            switch (code) {
                case 0: return { desc: '맑음/구름', icon: '☀️', bg: 'linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)' };
                case 1: case 4: return { desc: '비', icon: '🌧️', bg: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)' };
                case 2: return { desc: '비/눈', icon: '🌨️', bg: 'linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%)' };
                case 3: return { desc: '눈', icon: '❄️', bg: 'linear-gradient(135deg, #e6e9f0 0%, #eef1f5 100%)' };
                default: return { desc: '알 수 없음', icon: '❓', bg: 'linear-gradient(135deg, #bdc3c7 0%, #2c3e50 100%)' };
            }
        }

        // 5. 실시간 날씨 조회 메인 함수
        async function fetchRealTimeWeather() {
            try {
                // 시간 계산
                const { baseDate, baseTime, displayTime } = getBaseTime();
                
                // URL 생성
                const url = `${BASE_URL}?serviceKey=${API_KEY}&pageNo=1&numOfRows=10&dataType=JSON&base_date=${baseDate}&base_time=${baseTime}&nx=${NX}&ny=${NY}`;
                
                console.log('Fetching from:', url); // 디버깅용

                // API 호출
                const response = await fetch(url);
                if (!response.ok) throw new Error('네트워크 응답 에러');

                const data = await response.json();

                // 응답 결과 확인
                if (data.response.header.resultCode !== '00') {
                    throw new Error(`API 에러: ${data.response.header.resultMsg}`);
                }

                // 데이터 파싱 (item 배열)
                const items = data.response.body.items.item;
                
                // 필요한 값 추출
                const weatherInfo = {};
                items.forEach(item => {
                    if (item.category === 'T1H') weatherInfo.temp = item.obsrValue; // 기온
                    if (item.category === 'REH') weatherInfo.humi = item.obsrValue; // 습도
                    if (item.category === 'PTY') weatherInfo.pty = item.obsrValue;  // 강수형태
                });

                // 6. UI 업데이트
                const ptyStatus = getPTYStatus(weatherInfo.pty);

                dom.time.innerText = `${displayTime} 발표 데이터 (실시간)`;
                dom.icon.innerText = ptyStatus.icon;
                dom.temp.innerHTML = `${weatherInfo.temp}<span>°C</span>`;
                dom.desc.innerText = ptyStatus.desc;
                dom.humi.innerText = `${weatherInfo.humi}%`;
                
                // 배경색 변경
                document.body.style.background = ptyStatus.bg;

            } catch (error) {
                console.error('날씨 정보 요청 실패:', error);
                dom.card.innerHTML = `<div class="error-msg">날씨 정보를 가져오지 못했습니다.<br>(${error.message})</div>`;
            } finally {
                // 로딩 마스크 숨기기
                dom.loading.classList.add('hidden');
            }
        }

        // 7. 페이지 로드 시 실행
        window.onload = fetchRealTimeWeather;

    </script>
</body>
</html>
